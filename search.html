<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search DARK NETWORK RADIO transmissions and series files by signal, atmosphere, and frequency.">
  <title>Signal Search | DARK NETWORK RADIO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="archive-page search-page">
  <div class="scanlines" aria-hidden="true"></div>
  <header class="site-header">
    <a class="logo" href="index.html" aria-label="Dark Network Radio home"><i></i>DNR</a>
    <nav aria-label="Main navigation">
      <a href="index.html">Home</a><a href="index.html#broadcast">Broadcast</a><a href="broadcasts.html">Broadcasts</a><a href="series.html">Series</a><a href="search.html" aria-current="page">Search</a><a href="videos.html">Videos</a><a href="about.html">About</a>
    </nav>
  </header>

  <main class="archive-main" id="top">
    <section class="archive-intro search-intro" aria-labelledby="search-title">
      <p class="section-label">Signal Terminal</p>
      <h1 id="search-title">Signal<br><em>Search</em></h1>
      <p>
        Locate a transmission for your current state.
        Search by frequency, atmosphere, series, or signal name.
      </p>
    </section>

    <section class="search-console" aria-label="Signal search controls">
      <div class="search-field">
        <label for="signal-query">Keyword search</label>
        <input id="signal-query" type="search" placeholder="SEARCH TRANSMISSIONS..." autocomplete="off">
      </div>

      <div class="search-filter-group" aria-label="Content type filter">
        <p>Signal Type</p>
        <div class="search-button-row" id="search-type-filters">
          <button class="search-pill active" type="button" data-type="all" aria-pressed="true">ALL SIGNALS</button>
          <button class="search-pill" type="button" data-type="broadcast" aria-pressed="false">BROADCASTS</button>
          <button class="search-pill" type="button" data-type="series" aria-pressed="false">SERIES</button>
        </div>
      </div>

      <div class="search-filter-group" aria-label="Atmosphere tag filter">
        <p>Frequency Tags</p>
        <div class="search-button-row" id="search-tag-filters"></div>
      </div>

      <div class="search-select-grid">
        <div>
          <label for="search-series">Series</label>
          <select id="search-series">
            <option value="all">ALL SERIES</option>
          </select>
        </div>
        <div>
          <label for="search-sort">Sort</label>
          <select id="search-sort">
            <option value="newest">NEWEST FIRST</option>
            <option value="oldest">OLDEST FIRST</option>
            <option value="series">SERIES ORDER</option>
            <option value="title">TITLE A-Z</option>
          </select>
        </div>
      </div>

      <button class="search-reset" id="search-reset" type="button">RESET FILTERS</button>
    </section>

    <section class="search-results-header" aria-live="polite">
      <p id="search-count">0 SIGNALS FOUND</p>
    </section>

    <section class="search-results" id="search-results" aria-label="Signal search results"></section>
    <div class="search-load-more-wrap">
      <button class="search-reset" id="search-load-more" type="button" hidden>LOAD MORE SIGNALS</button>
    </div>
  </main>

  <footer><p>&copy; <span id="year"></span> DARK NETWORK RADIO</p><p>SIGNAL SEARCH / ONLINE</p></footer>
  <script src="script.js"></script>
</body>
</html>
